<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Car Racing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: monospace;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 400px;
        }
        canvas {
            display: block;
            width: 100%;
            background: #333;
        }
        #startScreen, #selectScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 10;
        }
        h1 { color: #ff0; font-size: 32px; margin-bottom: 20px; text-shadow: 2px 2px 0 #f00; }
        h2 { color: #0ff; margin-bottom: 20px; }
        button {
            background: #333;
            color: #fff;
            border: 2px solid #fff;
            padding: 15px 30px;
            font-size: 18px;
            font-family: monospace;
            margin: 10px;
            cursor: pointer;
            min-width: 200px;
        }
        button:hover { background: #555; }
        button:active { background: #777; }
        .car-option {
            display: inline-block;
            margin: 10px;
            padding: 10px;
            border: 2px solid #333;
            cursor: pointer;
        }
        .car-option.selected { border-color: #ff0; }
        .car-preview {
            width: 60px;
            height: 30px;
            margin: 10px auto;
        }
        .difficulty-option {
            display: inline-block;
            margin: 5px;
            padding: 8px 16px;
            border: 2px solid #555;
            cursor: pointer;
            color: #fff;
            font-family: monospace;
            font-size: 14px;
            text-transform: capitalize;
        }
        .difficulty-option.selected { border-color: #ff0; background: #444; }
        h3 { color: #aaa; font-size: 16px; margin: 15px 0 5px; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="startScreen">
            <h1>PIXEL CAR RACING</h1>
            <button onclick="showSelectScreen()">START GAME</button>
            <button onclick="showHighScores()">HIGH SCORES</button>
        </div>
        
        <div id="selectScreen" style="display:none;">
            <h2>SELECT CAR</h2>
            <div id="carOptions"></div>
            <h3>DIFFICULTY</h3>
            <div id="difficultyOptions"></div>
            <button onclick="startGame()">RACE!</button>
            <button onclick="showStartScreen()">BACK</button>
        </div>
        
        <div id="gameOverScreen" style="display:none;">
            <h2>GAME OVER</h2>
            <p id="finalScore" style="font-size: 24px; color: #ff0; margin: 20px 0;"></p>
            <p id="highScore" style="font-size: 18px; color: #0ff; margin: 10px 0;"></p>
            <button onclick="showSelectScreen()">RETRY</button>
            <button onclick="showStartScreen()">MENU</button>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
